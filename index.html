<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Эта строка делает сайт адаптивным под мобильные телефоны -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея картин</title>
    <style>
        /* Стили для красоты и сетки */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 { text-align: center; margin-bottom: 30px; }

        /* Сетка галереи автоматически перестраивается под экраны смартфонов */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            padding-bottom: 15px;
        }

        /* Резиновые картинки, которые не вылезают за границы экрана */
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card h3 { margin: 15px 0 5px; }
        .card p { color: #777; font-size: 14px; margin: 0 0 15px; }

        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<h1>Моя художественная галерея</h1>

<!-- ВАШ КУСОЧЕК КОДА НАЧИНАЕТСЯ ТУТ -->
<div class="gallery">
    <!-- Карточка вашей первой картины -->
    <div class="card">
        <img src="paintings/bear1.jpg" alt="Медведь">
        <h3>Звездная ночь над городом</h3>
        <p>Холст, масло. 40х50 см. 2026 г.</p>
        <a href="https://t.me" class="btn" target="_blank">Узнать цену</a>
    </div>

    <!-- Карточка вашей второй картины -->
    <div class="card">
        <img src="paintings/tiger1.jpg" alt="Тигр">
        <h3>Утренний туман</h3>
        <p>Акварель, бумага. 30х40 см</p>
        <a href="https://t.me" class="btn" target="_blank">Узнать цену</a>
    </div>
</div>
<!-- ВАШ КУСОЧЕК КОДА ЗАКОНЧИЛСЯ -->

</body>
</html>
