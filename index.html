<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея картин</title>
    <!-- Подключаем стили для увеличения картинок -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f1f3f5;
            color: #333;
        }
        h1 { text-align: center; margin-bottom: 40px; font-weight: 300; letter-spacing: 1px; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Обертка для фото, чтобы контролировать пропорции */
        .img-container {
            width: 100%;
            height: 320px; /* Увеличили высоту превью */
            background-color: #eaeaea;
            overflow: hidden;
            cursor: pointer;
        }

        /* Теперь картинка НЕ ОБРЕЗАЕТСЯ, а красиво вписывается целиком */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Картина видна ПОЛНОСТЬЮ без искажений */
            transition: transform 0.3s ease;
        }

        /* Эффект приближения при наведении мышки */
        .img-container:hover img {
            transform: scale(1.03);
        }

        .card-info { padding: 0 15px; }
        .card h3 { margin: 15px 0 5px; font-size: 18px; }
        .card p { color: #666; font-size: 14px; margin: 0 0 20px; }

        .btn {
            display: inline-block;
            background-color: #1e1e1e;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
            margin: 0 auto;
        }
        .btn:hover { background-color: #444; }
    </style>
</head>
<body>

<h1>Моя художественная галерея</h1>

<div class="gallery">
    <!-- Карточка 1 -->
    <div class="card">
        <!-- Ссылка вокруг картинки открывает оригинал на весь экран -->
        <a href="paintings/bear1.jpg" data-lightbox="gallery" data-title="Звездная ночь над городом" class="img-container">
            <img src="paintings/bear1.jpg" alt="Медведь">
        </a>
        <div class="card-info">
            <h3>Звездная ночь над городом</h3>
            <p>Холст, масло. 40х50 см. 2026 г.</p>
            <a href="https://vk.ru/sha_te" class="btn" target="_blank">Узнать цену</a>
        </div>
    </div>

    <!-- Карточка 2 -->
    <div class="card">
        <a href="paintings/tiger1.jpg" data-lightbox="gallery" data-title="Утренний туман" class="img-container">
            <img src="paintings/tiger1.jpg" alt="Тигр">
        </a>
        <div class="card-info">
            <h3>Утренний туман</h3>
            <p>Акварель, бумага. 30х40 см</p>
            <a href="https://vk.ru/sha_te" class="btn" target="_blank">Узнать цену</a>
        </div>
    </div>
</div>

<!-- Подключаем скрипты для работы всплывающего окна -->
<script src="https://cloudflare.com"></script>

</body>
</html>
